# MySQL를 Kubernetes에서 실행
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mariadb

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mariadb

  template:
    metadata:
      labels:
        app: mariadb

    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: root 
            - name: MYSQL_DATABASE
              value: beatbuddy
            - name: MYSQL_USER
              value: beyond
            - name: MYSQL_PASSWORD
              value: beyond